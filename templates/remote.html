<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Sentry Dashboard</title>
    <!-- PWA Setup -->
    <link rel="manifest" href="/static/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#11141c">
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00e5ff; /* Cyan */
            --danger: #ff2a55; /* Neon Red */
            --surface: rgba(255, 255, 255, 0.03);
            --surface-hover: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.08);
            --bg: #090b10;
        }

        * { box-sizing: border-box; }
        
        body { 
            margin: 0; padding: 0; padding-bottom: 40px;
            background: var(--bg); 
            background-image: radial-gradient(circle at 50% 0%, #171d2b 0%, var(--bg) 70%);
            color: white; font-family: 'Outfit', sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; overflow-y: auto; overflow-x: hidden;
        }

        header { 
            width: 100%; padding: 20px; 
            background: transparent; position: relative;
            z-index: 10; display: flex; justify-content: space-between; align-items: center;
            max-width: 600px; margin: 0 auto;
        }
        
        h1 { 
            margin: 0; font-size: 1.4rem; font-weight: 800;
            background: linear-gradient(90deg, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }

        .faces-btn { 
            background: var(--surface); color: white; border: 1px solid var(--border); 
            padding: 12px 20px; border-radius: 20px; font-weight: 600; cursor: pointer; 
            font-size: 0.95rem; transition: all 0.3s ease; backdrop-filter: blur(10px);
        }
        .faces-btn:active { transform: scale(0.95); background: var(--surface-hover); }

        /* --- Hardware Telemetry UI --- */
        .hardware-status {
            display: flex; align-items: center; gap: 8px; color: rgba(255,255,255,0.4); font-size: 0.65rem; font-weight: 700; letter-spacing: 1.5px; margin-top: 4px; padding-bottom: 4px;
        }
        .status-dot {
            width: 6px; height: 6px; border-radius: 50%; background: #ffaa00; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .status-dot.online { background: #00ff88; box-shadow: 0 0 10px #00ff88; }
        .status-dot.offline { background: #ff3366; box-shadow: 0 0 10px #ff3366; }

        .dashboard-main {
            display: flex; flex-direction: column; align-items: center; width: 100%; padding: 0 15px; 
            gap: 25px; flex: 1; max-width: 600px; 
        }

        .view-controls {
            display: flex; gap: 8px; width: 100%; max-width: 600px; justify-content: center; margin-bottom: 15px;
        }
        .view-btn {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #aaa;
            padding: 8px 16px; border-radius: 12px; font-size: 0.85rem; cursor: pointer; transition: all 0.2s;
        }
        .view-btn.active { background: var(--primary); color: #000; font-weight: 800; border-color: var(--primary); }

        .stream-wrapper { 
            border-radius: 12px; overflow: hidden; position: relative; 
            background: #000; box-shadow: 0 15px 40px rgba(0, 0, 0, 0.8), inset 0 0 0 1px var(--border);
            flex-shrink: 0; transition: all 0.3s ease; margin: 0 auto;
        }
        
        .view-horizontal { width: 100%; max-width: 600px; height: auto; aspect-ratio: 16/9; }
        .view-vertical { width: auto; height: 50vh; max-height: 500px; aspect-ratio: 9/16; border-radius: 18px; }
        .view-full { width: 100%; max-width: 600px; height: 55vh; max-height: 600px; aspect-ratio: unset; border-radius: 18px; }
        
        .stream-wrapper img { width: 100%; height: 100%; display: block; object-fit: cover; }
        
        .live-badge { 
            position: absolute; top: 15px; left: 15px; 
            background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
            padding: 6px 14px; border-radius: 20px; font-size: 0.8rem; font-weight: 800; 
            letter-spacing: 1px; display: flex; align-items: center; border: 1px solid rgba(255,255,255,0.1);
        }
        .dot { width: 8px; height: 8px; border-radius: 50%; background-color: var(--danger); margin-right: 8px; box-shadow: 0 0 10px var(--danger); animation: pulse 1.5s infinite; }

        .control-deck {
            display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 380px; padding: 10px 0; margin-bottom: 20px;
        }

        .dpad { display: grid; grid-template-columns: repeat(3, 60px); grid-template-rows: repeat(3, 60px); gap: 6px; }
        .dpad button { 
            background: var(--surface); border: 1px solid var(--border); border-radius: 16px; 
            color: white; font-size: 1.4rem; cursor: pointer; transition: all 0.2s; backdrop-filter: blur(10px);
            display: flex; align-items: center; justify-content: center; user-select: none;
        }
        .dpad button:active { background: var(--surface-hover); transform: scale(0.9); }
        .up { grid-column: 2; grid-row: 1; }
        .left { grid-column: 1; grid-row: 2; }
        .center { grid-column: 2; grid-row: 2; font-size: 1rem !important; font-weight: 800; color: var(--primary) !important; border-color: rgba(0, 229, 255, 0.3) !important; }
        .right { grid-column: 3; grid-row: 2; }
        .down { grid-column: 2; grid-row: 3; }

        .mic-box { display: flex; flex-direction: column; align-items: center; margin-left: 20px; }
        .mic-btn { 
            width: 85px; height: 85px; border-radius: 50%; 
            background: linear-gradient(135deg, #ff4d6d, var(--danger)); border: none; 
            color: white; font-size: 2rem; display: flex; align-items: center; justify-content: center; 
            cursor: pointer; transition: all 0.2s ease; user-select: none; -webkit-touch-callout: none;
            box-shadow: 0 10px 20px rgba(255, 42, 85, 0.3), inset 0 -4px 0 rgba(0,0,0,0.2);
        }
        .mic-btn.recording { 
            transform: scale(0.95) translateY(4px); 
            box-shadow: 0 0 30px rgba(255, 42, 85, 0.8), inset 0 2px 0 rgba(0,0,0,0.2); 
            background: var(--danger); animation: mic-pulse 1s infinite; 
        }
        .mic-status { margin-top: 15px; font-size: 0.85rem; color: #888; font-weight: 800; letter-spacing: 2px; }

        /* Modal Settings */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; backdrop-filter: blur(8px); }
        .modal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -46%); opacity: 0; visibility: hidden;
            background: #11141c; width: 92%; max-width: 440px; border-radius: 24px;
            padding: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); border: 1px solid var(--border);
            z-index: 101; max-height: 85vh; overflow-y: auto; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none; display: none;
        }
        .modal.open { transform: translate(-50%, -50%); opacity: 1; visibility: visible; pointer-events: auto; }
        
        .modal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 15px; margin-bottom: 20px; }
        .modal-header h3 { font-size: 1.4rem; margin: 0; color: white; font-weight: 800; }
        .close-btn { background: var(--surface); border: 1px solid var(--border); color: #fff; width: 36px; height: 36px; border-radius: 50%; font-size: 1rem; cursor: pointer; display:grid; place-items:center; }

        .list-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 20px; }
        .face-card { background: var(--surface); border-radius: 16px; overflow: hidden; position: relative; border: 1px solid var(--border); padding: 10px; text-align: center; }
        .face-card img { width: 100%; height: 140px; object-fit: cover; border-radius: 8px; }
        .delete-btn { 
            position: absolute; top: 8px; right: 8px; background: rgba(255, 42, 85, 0.9); border: none; color: white; 
            border-radius: 50%; width: 28px; height: 28px; cursor: pointer; backdrop-filter: blur(4px); display:grid; place-items:center;
            font-size: 14px;
        }

        .upload-zone { border: 2px dashed var(--primary); padding: 30px; border-radius: 16px; text-align: center; cursor: pointer; margin-bottom: 20px; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.2; } 100% { opacity: 1; } }
        @keyframes mic-pulse { 0% { box-shadow: 0 0 0 0 rgba(255, 42, 85, 0.7); } 70% { box-shadow: 0 0 0 20px rgba(255, 42, 85, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 42, 85, 0); } }

        @media (max-width: 380px) {
            .dpad { grid-template-columns: repeat(3, 50px); grid-template-rows: repeat(3, 50px); }
            .mic-btn { width: 75px; height: 75px; font-size: 1.5rem; }
            .stream-wrapper { border-radius: 16px; }
        }
    </style>
</head>
<body>
    <header>
        <div style="display:flex; flex-direction:column; gap:2px;">
            <h1 style="line-height:0.9;">AI SENTRY</h1>
            <div class="hardware-status" id="hwStatus">
                <span class="status-dot"></span> <span id="hwText">HARDWARE: PENDING</span>
            </div>
        </div>
        <div style="display: flex; gap: 8px;">
            <button class="faces-btn" id="patrolToggleBtn" style="background: rgba(0, 229, 255, 0.2); color: #00e5ff;" onclick="togglePatrol()">🔄 Patrol: ON</button>
            <button class="faces-btn" style="background: rgba(255, 42, 85, 0.2); color: #ff2a55;" onclick="openEvidenceLog()">🔴 Logs</button>
            <button class="faces-btn" onclick="openFaceManager()">👥 Faces</button>
        </div>
    </header>

    <div class="dashboard-main">
        <div class="view-controls">
            <button class="view-btn active" onclick="setView('horizontal', this)">Horizontal</button>
            <button class="view-btn" onclick="setView('vertical', this)">Vertical</button>
            <button class="view-btn" onclick="setView('full', this)">Full View</button>
        </div>

        <div class="stream-wrapper view-horizontal" id="streamWrapper">
            <div class="live-badge"><div class="dot"></div> LIVE</div>
            <img src="/video_feed" id="videoStreamImage" alt="Establishing Secure Connection...">
        </div>
        
        <script>
            // Break PWA Network Cache Lock
            document.getElementById('videoStreamImage').src = '/video_feed?bypassCache=' + new Date().getTime();
        </script>
        
        <div class="control-deck">
            <div class="dpad">
                <button class="up" id="btn-up" onclick="sendCommand('tilt', 'up', 'btn-up')">▲</button>
                <button class="left" id="btn-left" onclick="sendCommand('pan', 'left', 'btn-left')">◀</button>
                <button class="center" id="btn-center" onclick="sendCommand('center', 'reset', 'btn-center')">RST</button>
                <button class="right" id="btn-right" onclick="sendCommand('pan', 'right', 'btn-right')">▶</button>
                <button class="down" id="btn-down" onclick="sendCommand('tilt', 'down', 'btn-down')">▼</button>
            </div>
            <div class="mic-box">
                <button class="mic-btn" id="micBtn">🎙️</button>
                <div class="mic-status" id="micStatus">HOLD TO SPEAK</div>
            </div>
        </div>
    </div>

    <!-- Modals -->
    <div class="modal-overlay" id="modalOverlay"></div>

    <div class="modal" id="faceModal">
        <div class="modal-header">
            <h3>👥 Manage Known Faces</h3>
            <button class="close-btn" onclick="closeFaceManager()">✕</button>
        </div>
        
        <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
            <div style="font-size: 2rem; margin-bottom: 10px;">📸</div>
            <div style="font-weight: 600;">Tap or Drop Face Image</div>
            <div style="font-size: 0.85rem; color: #888; margin-top: 5px;">Must clearly show person's whole face</div>
        </div>
        <input type="file" id="fileInput" accept="image/*" style="display: none" onchange="handleFileUpload(this.files[0])">
        
        <div class="list-container" id="faceList">
            <!-- Faces go here -->
        </div>
    </div>

    <div class="modal" id="evidenceModal">
        <div class="modal-header">
            <h3>🔴 Intruder Logs</h3>
            <button class="close-btn" onclick="closeEvidenceLog()">✕</button>
        </div>
        <div class="list-container" id="evidenceList">
            <!-- Evidence goes here -->
        </div>
    </div>

    <!-- Lightbox Modal -->
    <div id="lightboxOverlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:200; backdrop-filter:blur(10px);" onclick="closeLightbox()">
        <div style="position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%); width: 100%; text-align: center;">
            <img id="lightboxImg" style="max-width: 95vw; max-height: 75vh; border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.9); object-fit: contain;">
            <div id="lightboxText" style="margin-top: 20px; color: white; font-size: 1.1rem; font-weight: 800; background: rgba(255,42,85,0.2); border: 1px solid rgba(255,42,85,0.4); display: inline-block; padding: 8px 20px; border-radius: 20px; letter-spacing: 1px;"></div>
        </div>
        <button style="position:absolute; top:20px; right:20px; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); color:white; width:40px; height:40px; border-radius:50%; font-size:1.2rem; cursor:pointer;" onclick="closeLightbox()">✕</button>
    </div>

    <script>
        // API Calls
        function togglePatrol() {
            fetch('/toggle_patrol', { method: 'POST' })
                .then(res => res.json())
                .then(data => {
                    const btn = document.getElementById('patrolToggleBtn');
                    if(data.state === 'enabled') {
                        btn.innerHTML = '🔄 Patrol: ON';
                        btn.style.background = 'rgba(0, 229, 255, 0.2)';
                        btn.style.color = '#00e5ff';
                    } else {
                        btn.innerHTML = '⏸ Patrol: OFF';
                        btn.style.background = 'rgba(255, 255, 255, 0.1)';
                        btn.style.color = '#888';
                    }
                    if (navigator.vibrate) navigator.vibrate(30);
                }).catch(err => console.error(err));
        }

        function sendCommand(motor, direction, btnId) {
            if (btnId) {
                const btn = document.getElementById(btnId);
                if (btn) {
                    btn.style.transform = "scale(0.85)";
                    btn.style.background = "rgba(255,255,255,0.2)";
                    setTimeout(() => {
                        btn.style.transform = "none";
                        btn.style.background = "rgba(255, 255, 255, 0.03)";
                    }, 150);
                }
            }
            if (navigator.vibrate) navigator.vibrate(40);
            
            fetch(`/control/${motor}/${direction}`)
                .then(res => res.json())
                .catch(err => console.error(err));
        }

        // Evidence Log Data Fetch
        function loadEvidence() {
            const list = document.getElementById('evidenceList');
            list.innerHTML = '<p style="text-align:center;color:#888;grid-column:span 2;">Scanning logs...</p>';
            fetch('/api/intruders')
                .then(res => res.json())
                .then(data => {
                    list.innerHTML = '';
                    if (data.intruders.length === 0) list.innerHTML = '<p style="text-align:center;color:#888;grid-column:span 2;">No intruders logged.</p>';
                    data.intruders.forEach(ev => {
                        list.innerHTML += `
                            <div class="face-card">
                                <img src="/api/image/intruders/${ev.filename}" alt="Intruder Photo" onclick="openLightbox('${ev.filename}', '${ev.time}')" style="cursor: zoom-in;">
                                <span style="font-size: 0.8rem; display:block; margin-top:5px;">${ev.time}</span>
                                <button class="delete-btn" onclick="deleteEvidence('${ev.filename}')">✕</button>
                            </div>
                        `;
                    });
                }).catch(err => console.error(err));
        }

        function deleteEvidence(filename) {
            fetch(`/api/intruders/${filename}`, { method: 'DELETE' })
                .then(res => res.json())
                .then(data => { if (data.status === 'success') loadEvidence(); })
                .catch(err => console.error(err));
        }

        // View Toggles
        function setView(mode, btnEl) {
            document.getElementById('streamWrapper').className = 'stream-wrapper view-' + mode;
            document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
            btnEl.classList.add('active');
            if (navigator.vibrate) navigator.vibrate(30);
        }

        // Voice Controls
        const micBtn = document.getElementById('micBtn');
        const micStatus = document.getElementById('micStatus');
        let mediaRecorder, audioChunks = [], isRecording = false;

        if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
            navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
                mediaRecorder = new MediaRecorder(stream);
                mediaRecorder.addEventListener("dataavailable", ev => audioChunks.push(ev.data));
                mediaRecorder.addEventListener("stop", () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    audioChunks = [];
                    micStatus.innerText = "TRANSMITTING"; micStatus.style.color = "#00e5ff";
                    
                    const fd = new FormData(); fd.append("audio", audioBlob, "voice.webm");
                    fetch('/audio_command', { method: 'POST', body: fd })
                        .then(() => { micStatus.innerText = "HOLD TO SPEAK"; micStatus.style.color = "#888"; })
                        .catch(() => { micStatus.innerText = "ERROR"; micStatus.style.color = "#ff2a55"; setTimeout(() => { micStatus.innerText = "HOLD TO SPEAK"; micStatus.style.color = "#888"; }, 2000); });
                });
            }).catch(err => {
                micStatus.innerText = "ERROR: " + err.name; micStatus.style.color = "#ff2a55";
            });
        } else {
            micStatus.innerText = "MIC UNAVAILABLE (HTTP)"; micStatus.style.color = "#888";
        }

        function startRecording(e) {
            if (e.target === micBtn || e.target.closest('#micBtn')) { e.preventDefault(); }
            if (!mediaRecorder) return;
            if (mediaRecorder.state === "inactive") {
                isRecording = true; mediaRecorder.start();
                micBtn.classList.add("recording");
                micStatus.innerText = "RECORDING..."; micStatus.style.color = "#ff2a55";
            }
        }

        function stopRecording(e) {
            if (mediaRecorder && mediaRecorder.state === "recording") {
                isRecording = false; mediaRecorder.stop();
                micBtn.classList.remove("recording");
            }
        }

        micBtn.addEventListener("mousedown", startRecording);
        micBtn.addEventListener("touchstart", startRecording, {passive: false});
        document.addEventListener("mouseup", stopRecording);
        document.addEventListener("touchend", stopRecording);

        // Lightbox Logic
        function openLightbox(filename, timeStr) {
            document.getElementById('lightboxImg').src = `/api/image/intruders/${filename}`;
            document.getElementById('lightboxText').innerText = `DETECTED: ${timeStr}`;
            document.getElementById('lightboxOverlay').style.display = 'block';
        }
        function closeLightbox() {
            document.getElementById('lightboxOverlay').style.display = 'none';
        }

        // Modal Logic
        const overlay = document.getElementById('modalOverlay');
        const faceModal = document.getElementById('faceModal');
        const evidenceModal = document.getElementById('evidenceModal');

        overlay.addEventListener('click', () => { closeFaceManager(); closeEvidenceLog(); });

        function openEvidenceLog() {
            overlay.style.display = 'block';
            evidenceModal.style.display = 'block';
            setTimeout(() => evidenceModal.classList.add('open'), 10);
            loadEvidence();
        }

        function closeEvidenceLog() {
            evidenceModal.classList.remove('open');
            setTimeout(() => { evidenceModal.style.display = 'none'; checkOverlay(); }, 300);
        }

        function checkOverlay() {
            if (faceModal.style.display !== 'block' && evidenceModal.style.display !== 'block') {
                overlay.style.display = 'none';
            }
        }

        function openFaceManager() {
            overlay.style.display = 'block';
            faceModal.style.display = 'block';
            setTimeout(() => faceModal.classList.add('open'), 10);
            loadFaces();
        }

        function closeFaceManager() {
            faceModal.classList.remove('open');
            setTimeout(() => { faceModal.style.display = 'none'; checkOverlay(); }, 300);
        }

        function loadFaces() {
            const grid = document.getElementById('faceList');
            grid.innerHTML = '<div style="color: #777; text-align: center; grid-column: span 2; padding: 20px;">Retrieving Intel...</div>';
            
            fetch('/api/faces').then(res => res.json()).then(data => {
                grid.innerHTML = '';
                if (!data.faces || data.faces.length === 0) {
                    grid.innerHTML = '<div style="color: #777; text-align: center; grid-column: span 2; padding: 20px;">No targets recognized.</div>';
                    return;
                }
                data.faces.forEach(f => {
                    grid.innerHTML += `
                        <div class="face-card">
                            <button class="delete-btn" onclick="deleteFace('${f.filename}')">✕</button>
                            <img src="/api/image/known_faces/${f.filename}">
                            <div style="padding: 10px; font-weight: 600;">${f.name}</div>
                        </div>`;
                });
            }).catch(() => grid.innerHTML = '<div style="color: #ff2a55; text-align: center; grid-column: span 2;">Network Error.</div>');
        }

        function deleteFace(filename) {
            if(!confirm("Erase target data?")) return;
            fetch(`/api/faces/${filename}`, { method: 'DELETE' }).then(res => res.json()).then(data => {
                if(data.status === 'success') loadFaces(); else alert("Error: " + data.message);
            });
        }

        function handleFileUpload(file) {
            if (!file) return;
            const n = prompt("Enter Target's Name:");
            if (!n) return;
            
            const btn = document.getElementById('uploadZone');
            const originalHTML = btn.innerHTML;
            btn.innerHTML = `<div style="font-size: 1.5rem; margin-bottom: 10px;">⏳</div><div style="font-weight: 600;">Training Neural Net...</div>`;
            
            const fd = new FormData(); fd.append('name', n); fd.append('image', file);
            fetch('/api/faces', { method: 'POST', body: fd }).then(res => res.json()).then(data => {
                btn.innerHTML = originalHTML;
                document.getElementById('fileInput').value = '';
                if(data.status === 'success') {
                    loadFaces();
                } else alert("Error: " + data.message);
            }).catch(() => { btn.innerHTML = originalHTML; alert("Upload failed."); });
        }

        // URGENT FIX: Service Workers inherently break infinite MJPEG streams on Android Chrome.
        // We must unregister it so the browser natively handles the /video_feed stream again.
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(registrations) {
                for(let registration of registrations) {
                    registration.unregister().then(function(boolean) {
                        console.log('Service worker unregistered to fix video stream');
                    });
                }
            });
        }

        // --- Hardware Heartbeat Telemetry Ping ---
        setInterval(() => {
            fetch('/state')
            .then(res => res.json())
            .then(data => {
                const hwDot = document.querySelector('#hwStatus .status-dot');
                const hwText = document.getElementById('hwText');
                if (data.hardware === 'online') {
                    hwDot.className = 'status-dot online'; hwText.innerText = 'HARDWARE: ONLINE';
                } else if (data.hardware === 'offline') {
                    hwDot.className = 'status-dot offline'; hwText.innerText = 'HARDWARE: OFFLINE';
                } else {
                    hwDot.className = 'status-dot'; hwText.innerText = 'HARDWARE: PENDING CONFIG';
                }
            }).catch(e => {
                // Flask Python Crash Handle
                document.querySelector('#hwStatus .status-dot').className = 'status-dot offline';
                document.getElementById('hwText').innerText = 'SERVER DISCONNECTED';
            });
        }, 3000);
    </script>
</body>
</html>
